<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Interlocking squares pattern (Umayyah-inspired) -->
  <!-- Outer square rotated 45deg -->
  <polygon points="24,2 46,24 24,46 2,24" stroke="currentColor" stroke-width="0.75" fill="none" opacity="0.07"/>
  <!-- Inner square axis-aligned -->
  <rect x="10" y="10" width="28" height="28" stroke="currentColor" stroke-width="0.75" fill="none" opacity="0.06"/>
  <!-- Center octagon from overlap -->
  <polygon points="18,10 30,10 38,18 38,30 30,38 18,38 10,30 10,18" stroke="currentColor" stroke-width="0.5" fill="none" opacity="0.05"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="2" stroke="currentColor" stroke-width="0.4" fill="none" opacity="0.04"/>
</svg>
